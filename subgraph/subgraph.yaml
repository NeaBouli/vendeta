specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:

  - kind: ethereum
    name: VendRegistry
    network: base
    source:
      address: "0x77e99917Eca8539c62F509ED1193ac36580A6e7B"
      abi: VendRegistry
      startBlock: 39009832
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Submission
        - User
        - GeohashRegion
        - GlobalStats
      abis:
        - name: VendRegistry
          file: ./abis/VendRegistry.json
      eventHandlers:
        - event: SubmissionCreated(indexed bytes32,indexed bytes32,uint64,bytes3,int32,int32,string,indexed bytes32,bool,uint32)
          handler: handleSubmissionCreated
        - event: DuplicateDetected(indexed bytes32,indexed bytes32,indexed bytes32)
          handler: handleDuplicateDetected
        - event: SubmissionAutoVerified(indexed bytes32,indexed bytes32)
          handler: handleSubmissionAutoVerified
      file: ./src/registry.ts

  - kind: ethereum
    name: VendTrust
    network: base
    source:
      address: "0x769928aBDfc949D0718d8766a1C2d7dBb63954Eb"
      abi: VendTrust
      startBlock: 39009832
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Vote
        - ConsensusEvent
        - User
        - Submission
      abis:
        - name: VendTrust
          file: ./abis/VendTrust.json
      eventHandlers:
        - event: VoteCast(indexed bytes32,indexed bytes32,bool,uint16,uint32,uint32)
          handler: handleVoteCast
        - event: ConsensusReached(indexed bytes32,bool,uint32,uint32)
          handler: handleConsensusReached
        - event: TrustUpdated(indexed bytes32,uint16,uint16,string)
          handler: handleTrustUpdated
        - event: LocalityRecorded(indexed bytes32,string,uint32)
          handler: handleLocalityRecorded
      file: ./src/trust.ts

  - kind: ethereum
    name: VendRewards
    network: base
    source:
      address: "0x670D293e3D65f96171c10DdC8d88B96b0570F812"
      abi: VendRewards
      startBlock: 39009832
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - RewardEvent
        - User
        - Submission
        - GlobalStats
      abis:
        - name: VendRewards
          file: ./abis/VendRewards.json
      eventHandlers:
        - event: RewardEarned(indexed bytes32,indexed bytes32,uint64,uint64,string)
          handler: handleRewardEarned
        - event: FirstMoverBonusPaid(indexed bytes32,indexed bytes32,uint64)
          handler: handleFirstMoverBonusPaid
        - event: SilentConsensusPaid(indexed bytes32,indexed bytes32,uint64)
          handler: handleSilentConsensusPaid
        - event: CreditsUpdated(indexed bytes32,uint256,uint256)
          handler: handleCreditsUpdated
        - event: TierUpdated(indexed bytes32,uint8)
          handler: handleTierUpdated
      file: ./src/rewards.ts

  - kind: ethereum
    name: VendClaim
    network: base
    source:
      address: "0x4807B77B2E25cD055DA42B09BA4d0aF9e580C60a"
      abi: VendClaim
      startBlock: 39009832
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ClaimEvent
        - User
        - GlobalStats
      abis:
        - name: VendClaim
          file: ./abis/VendClaim.json
      eventHandlers:
        - event: ClaimInitiated(indexed bytes32,indexed address,uint256,uint256,uint256,uint32)
          handler: handleClaimInitiated
        - event: RateUpdated(uint256,uint256,uint32)
          handler: handleRateUpdated
        - event: WalletRegistered(indexed bytes32,indexed address)
          handler: handleWalletRegistered
      file: ./src/claim.ts
