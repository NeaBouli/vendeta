name: vendetta
description: Community Price Transparency Network
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State Management
  flutter_riverpod: ^2.6.0

  # Maps (OSM)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Barcode Scanner
  mobile_scanner: ^6.0.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # HTTP
  http: ^1.2.0

  # GPS
  geolocator: ^13.0.0

  # Permissions
  permission_handler: ^11.3.0

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
