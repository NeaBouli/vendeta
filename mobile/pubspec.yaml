name: vendetta
description: Community Price Transparency Network
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^17.0.0

  # State Management
  flutter_riverpod: ^3.0.0

  # Maps (OSM)
  flutter_map: ^8.0.0
  latlong2: ^0.9.1

  # Barcode Scanner
  mobile_scanner: ^7.0.0

  # Secure Storage
  flutter_secure_storage: ^10.0.0

  # Crypto (SHA-256 for submission hashes — matches Rust core)
  crypto: ^3.0.3

  # HTTP
  http: ^1.2.0

  # GPS
  geolocator: ^14.0.0

  # Permissions
  permission_handler: ^12.0.0

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
